[phases.setup]
nixPkgs = []
aptPkgs = [
  "python3",
  "python3-venv",
  "python3-pip",
  "gcc",
  "zlib1g",
  "libstdc++6",
  "build-essential",
]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv && . /opt/venv/bin/activate && pip install --upgrade pip && pip install --no-cache-dir -r backend/requirements.txt && python -c 'import numpy, pandas, pytrends; print(\"numpy\", numpy.__version__, \"pandas\", pandas.__version__)'"
]

[start]
# Root Directory is /backend in Railway → app/main.py already at /app/app/main.py
cmd = ". /opt/venv/bin/activate && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
