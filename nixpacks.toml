[phases.setup]
nixPkgs = []
aptPkgs = [
  "python3.11",
  "python3.11-venv",
  "python3-pip",
  "gcc",
  "zlib1g",
  "libstdc++6",
  "build-essential",
]

[phases.install]
cmds = [
  "python3.11 -m venv /opt/venv && . /opt/venv/bin/activate && pip install --upgrade pip && pip install --no-cache-dir -r backend/requirements.txt && python -c 'import numpy, pandas, pytrends; print(\"numpy\", numpy.__version__, \"pandas\", pandas.__version__)'"
]

[start]
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"
