[build]
builder = "nixpacks"

# Use apt (Ubuntu) python everything — avoids the Nix-store/system libc mismatch
# that was causing `libz.so.1: cannot open shared object file` and then
# `__tunable_is_initialized` glibc errors.
[build.nixpacksPlan.phases.setup]
nixPkgs = []
aptPkgs = [
  "python3",
  "python3-venv",
  "python3-pip",
  "gcc",
  "zlib1g",
  "libstdc++6",
  "build-essential",
]

[build.nixpacksPlan.phases.install]
cmds = [
  "python3 -m venv /opt/venv && . /opt/venv/bin/activate && pip install --upgrade pip && pip install --no-cache-dir -r backend/requirements.txt && python -c 'import numpy, pandas, pytrends; print(\"numpy\", numpy.__version__, \"pandas\", pandas.__version__)'"
]

[build.nixpacksPlan.start]
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"

[deploy]
startCommand = ". /opt/venv/bin/activate && cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
