[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "gcc"]

[build.nixpacksPlan.phases.install]
cmds = [
  "python -m venv /opt/venv && . /opt/venv/bin/activate && pip install --upgrade pip && pip install --no-cache-dir numpy>=1.26.0 pandas>=2.0.0 && pip install --no-cache-dir -r backend/requirements.txt"
]

[build.nixpacksPlan.start]
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"

[deploy]
startCommand = ". /opt/venv/bin/activate && cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
