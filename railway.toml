[build]
builder = "nixpacks"

[build.nixpacksPlan.phases.setup]
# zlib + stdenv.cc.cc.lib are required for numpy/pandas C extensions
# (numpy ships native binaries that dlopen libz.so.1 / libstdc++.so.6)
nixPkgs = ["python311", "python311Packages.pip", "gcc", "zlib", "stdenv.cc.cc.lib"]

[build.nixpacksPlan.phases.install]
cmds = [
  "python -m venv /opt/venv && . /opt/venv/bin/activate && pip install --upgrade pip && pip install --no-cache-dir -r backend/requirements.txt && pip install --no-cache-dir --force-reinstall --no-deps 'numpy==1.26.4' && pip install --no-cache-dir --force-reinstall --no-deps 'pandas==2.1.4' && python -c 'import numpy, pandas; print(\"numpy\", numpy.__version__, \"pandas\", pandas.__version__)'"
]

[build.nixpacksPlan.variables]
NIXPACKS_LIBS = "zlib stdenv.cc.cc.lib"

[build.nixpacksPlan.start]
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"

[deploy]
startCommand = ". /opt/venv/bin/activate && cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
